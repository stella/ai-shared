name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  sync-script:
    name: sync script
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check shell syntax
        run: bash -n scripts/*.sh
      - name: Run sync regressions
        run: bash scripts/test-sync-ai-skills.sh
